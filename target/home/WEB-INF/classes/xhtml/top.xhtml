<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
	"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:component xmlns="http://www.w3.org/1999/xhtml"
	xmlns:c="jakarta.tags.core"
	xmlns:cc="jakarta.faces.composite"
	xmlns:f="jakarta.faces.core"
	xmlns:faces="jakarta.faces"
	xmlns:fn="jakarta.tags.functions"
	xmlns:h="jakarta.faces.html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pass="jakarta.faces.passthrough"
	xmlns:ui="jakarta.faces.facelets">
	
	<h:form>
        <p:outputPanel id="topBanner"
	        styleClass="top-banner"
	        style="background-image: url('#{resource['images/theme.jpg']}');">
	        <p:tooltip for="@next" value="Go to Home page" showEffect="fade" hideEffect="fade" position="bottom"/>
        	<p:link id="homeTopHomeLink"
        		value="DEEPLITHO" 
            	styleClass="banner-left deeplitho-shadow"
            	style="text-decoration:none"
        		href="#{homeBean.getHomeUrl()}"/>
	        <h:panelGroup layout="block" styleClass="banner-center">
	            <h:outputText value="#{homeBean.appLabel}"/>
	        </h:panelGroup>
	        <h:panelGroup layout="block" styleClass="banner-right">
	        	<p:tooltip for="@next"
	        		value="Manage your acoount"
	        		showEffect="fade"
	        		hideEffect="fade"
	        		position="bottom"/>
	        	<div>
	        		<span>
			        	<p:link id="homeTopUsernameLink"
			        		style="color:white;"
			        		value="Logged in as: #{homeBean.userName}" 
			        		href="#{homeBean.keycloakUrl}/../realms/deeplitho/account"/>
			        	<br/>
			        	<h:outputText value="Version #{homeBean.appVersion}"
			        		style="color:white;font-size:12px;font-style:italic;"/>
		        	</span>
	        	</div>
	        </h:panelGroup>
	    </p:outputPanel>
    </h:form>
	
	<div class="card">
	    <h:form>
	        <p:growl id="messages"/>
	        <p:menubar hideDelay="1000" styleClass="home-menu ml-2">
	            <p:submenu label="Focus Spot Monitoring">
                    <p:menuitem value="Notification" url="#{homeBean.getFsmTabUrl(0)}"/>
                    <p:menuitem value="Alert Job" url="#{homeBean.getFsmTabUrl(1)}"/>
                    <p:menuitem value="Alert Recipe" url="#{homeBean.getFsmTabUrl(2)}"/>
                    <p:menuitem value="History Lot" disabled="true"/>
                    <p:menuitem value="History Wafer" disabled="true"/>
	            </p:submenu>
	            <p:submenu label="Q-Litho" styleClass="custom-submenu-icon">
	            </p:submenu>
	        </p:menubar>
	    </h:form>
	</div>
	
	<ui:remove>
	<h:form>
	    <p:dock position="bottom">
	        <p:menuitem value="Home" icon="/resources/images/homeIcon.png"/>
	        <p:menuitem value="FSM" icon="/resources/images/fsmIcon.png"/>
	    </p:dock>
	</h:form>
	</ui:remove>
	
</ui:component>
